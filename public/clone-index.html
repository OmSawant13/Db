<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Captured Efficient Pages</title>
    <style>
      body {
        margin: 0;
        background: #fbfaf7;
        color: #111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(34px, 6vw, 64px);
        letter-spacing: -0.05em;
        line-height: 0.95;
      }

      p {
        color: #6f6c64;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: block;
        min-height: 140px;
        padding: 16px;
        border: 1px solid #e7e1d8;
        border-radius: 8px;
        background: #fff;
        color: #111;
        text-decoration: none;
      }

      span {
        color: #ff3157;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      strong {
        display: block;
        margin-top: 34px;
        font-size: 21px;
        line-height: 1.05;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Local clone</span>
      <h1>Captured Efficient pages</h1>
      <p>These routes render stored HTML from SQLite. Crawl more pages to add more local clone routes.</p>
      <div class="grid" id="grid"></div>
    </main>
    <script>
      fetch("/api/pages")
        .then((res) => res.json())
        .then((pages) => {
          document.querySelector("#grid").innerHTML = pages.map((page) => {
            const url = new URL(page.url);
            const path = url.pathname + url.search;
            const localPath = path === "/" ? "/" : path;
            const title = (page.title || page.url).replace(" | Efficient App", "");
            return `<a href="${localPath}"><span>${url.pathname}</span><strong>${title}</strong></a>`;
          }).join("");
        });
    </script>
  </body>
</html>
